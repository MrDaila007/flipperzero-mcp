name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src/ tests/

      - name: mypy
        run: mypy src/flipper_mcp --ignore-missing-imports
        continue-on-error: true  # treat as advisory until type coverage improves

  # ── Unit & integration tests ────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (unit + framing, skip hardware)
        run: |
          pytest tests/ \
            --ignore=tests/integration \
            -v \
            --tb=short \
            --cov=flipper_mcp \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Hardware integration tests (self-hosted runner with Flipper attached) ───
  hardware:
    name: Hardware integration
    runs-on: [self-hosted, flipper]
    # Only run when explicitly requested via label or workflow_dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-hardware-tests')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run hardware integration tests
        env:
          FLIPPER_PORT: ${{ vars.FLIPPER_PORT }}
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            -m integration \
            --timeout=30
